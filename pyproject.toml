[project]
name = "lda-wf"
version = "0.0.1"
description = "Add your description here"
readme = "readme.md"
authors = [{ name = "lda", email = "lda@ldlda.com" }]
requires-python = ">=3.14"
dependencies = [
    "fastmcp>=3.2.4",
    "mcp[cli,rich]>=1",
    "pydantic>=2",
]

[project.scripts]
wf-mcp = "wf_mcp.cli:main"

[dependency-groups]
dev = [
    "pytest>=8",
    # "pytest-sugar>=1",
]

[tool.pytest.ini_options]
addopts = "-p no:cacheprovider" 

[tool.uv]
package = true
